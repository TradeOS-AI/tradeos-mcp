# Publish tradeos-mcp to npm + MCP Registry on version tags.
# npm: Trusted Publishing (OIDC) when NPM_TOKEN is unset; or set NPM_TOKEN (Automation) as fallback.
# MCP: https://modelcontextprotocol.io/registry/github-actions

name: Publish to MCP Registry

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for npm + MCP Registry OIDC
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # OIDC only when NPM_TOKEN is not set (requires npm Trusted Publisher on @tradeos)
      - name: Set up Node.js (Trusted Publishing)
        if: ${{ secrets.NPM_TOKEN == '' }}
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      # Classic Automation token (same as alpha.1 if that publish succeeded)
      - name: Set up Node.js (NPM_TOKEN)
        if: ${{ secrets.NPM_TOKEN != '' }}
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Sync version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          node scripts/sync-registry-version.mjs "$VERSION"

      - name: Verify package before publish
        run: node scripts/verify-registry.mjs

      - name: Publish package to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Prerelease (e.g. 1.0.0-alpha.1) must not use dist-tag "latest"
          if [[ "$VERSION" == *-* ]]; then
            DIST_TAG="${VERSION#*-}"
            DIST_TAG="${DIST_TAG%%.*}"
            echo "Prerelease $VERSION → npm dist-tag: $DIST_TAG"
            npm publish --access public --tag "$DIST_TAG"
          else
            npm publish --access public
          fi

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish
