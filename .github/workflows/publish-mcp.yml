# Publish tradeos-mcp to npm + MCP Registry on version tags.
# npm: Trusted Publishing (OIDC) — no NPM_TOKEN. Configure on npmjs.com first.
# MCP: https://modelcontextprotocol.io/registry/github-actions

name: Publish to MCP Registry

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for npm + MCP Registry OIDC
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          # npm Trusted Publishing needs npm >= 11.5.1 (bundled with Node 24+)
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Sync version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          node scripts/sync-registry-version.mjs "$VERSION"

      - name: Verify package before publish
        run: node scripts/verify-registry.mjs

      - name: Publish package to npm
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Prerelease (e.g. 1.0.0-alpha.1) must not use dist-tag "latest"
          if [[ "$VERSION" == *-* ]]; then
            DIST_TAG="${VERSION#*-}"
            DIST_TAG="${DIST_TAG%%.*}"
            echo "Prerelease $VERSION → npm dist-tag: $DIST_TAG"
            npm publish --access public --tag "$DIST_TAG"
          else
            npm publish --access public
          fi

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish
